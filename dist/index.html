<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>insight Github</title>
    <link rel="stylesheet" href="./css/final.css" />
  <script defer src="bundle.js"></script></head>
  <body class="m-0 h-screen w-screen bg-[#b3c8cf] p-[3%]">
    <aside class="w-1/5 h-[94%] fixed">
      <div class="sidebar bg-[#e5ddc5] w-full h-full rounded-[54px]">
        <div class="flag w-full h-12 p-2 pr-3.5 flex justify-end">
          <img src="" alt="" />
        </div>
        <div class="profil_avatar flex justify-center">
          <img class="w-36 h-36 rounded-full" src="" alt="avatar" />
        </div>
        <h1 class="name flex justify-center font-bold"></h1>
        <h3 class="nickName flex justify-center"></h3>
        <div class="main_card flex justify-center mt-16">
          <div
            class="card_follow bg-[#b3c8cf] h-40 w-4/6 rounded-lg text-center p-5 grid gap-y-2 font-semibold"
          >
            <h3 class="follower">follower :</h3>
            <div class="following">following :</div>
            <div class="repos">Public Repos :</div>
            <div class="icone flex gap-4 justify-center mt-3">
              <a class="icone1" href="" target="_blank">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 128 128"
                >
                  <path
                    d="M75.916 54.2L122.542 0h-11.05L71.008 47.06L38.672 0H1.376l48.898 71.164L1.376 128h11.05L55.18 78.303L89.328 128h37.296L75.913 54.2ZM60.782 71.79l-4.955-7.086l-39.42-56.386h16.972L65.19 53.824l4.954 7.086l41.353 59.15h-16.97L60.782 71.793Z"
                  />
                </svg>
              </a>
              <a class="icone2" href="" target="_blank">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                >
                  <path
                    fill="black"
                    d="M3.055 11a9.009 9.009 0 0 1 6.277-7.598A16.906 16.906 0 0 0 7.029 11zm7.937-9.954C5.39 1.554 1 6.265 1 12s4.39 10.446 9.992 10.955l.008.01l.425.02A12.476 12.476 0 0 0 12 23a11.285 11.285 0 0 0 .575-.015l.425-.02l.008-.01C18.61 22.444 23 17.735 23 12S18.61 1.554 13.008 1.046L13 1.036l-.426-.021a11.162 11.162 0 0 0-1.148 0l-.426.02zM12.002 3a14.918 14.918 0 0 1 2.965 8H9.033a14.918 14.918 0 0 1 2.966-8H12zM7.028 13c.16 2.76.98 5.345 2.303 7.598A9.009 9.009 0 0 1 3.055 13zm4.97 8a14.918 14.918 0 0 1-2.966-8h5.934A14.918 14.918 0 0 1 12 21zm2.67-.402A16.907 16.907 0 0 0 16.97 13h3.974a9.009 9.009 0 0 1-6.276 7.598M16.97 11c-.16-2.76-.98-5.345-2.303-7.598A9.009 9.009 0 0 1 20.945 11z"
                  />
                </svg>
              </a>
            </div>
            <div
              class="date bg-[#F1EEDC] w-36 h-8 mt-14 rounded-full text-xs flex justify-center items-center"
            >
              <h3>Member since : year</h3>
            </div>
          </div>
        </div>
      </div>
    </aside>
    <main class="main h-dvh ml-[23%]">
      <div class="nav-container flex justify-center">
        <nav
          class="rounded-[15px] h-11 w-[93%] bg-[#e5ddc5] flex items-center justify-center"
        >
          <h1 class="font-light text-2xl">Github Insights</h1>
        </nav>
      </div>
      <div class="container-search flex justify-center">
        <input
          type="text"
          placeholder="Search..."
          id="search-input"
          class="search mt-8 h-8 w-[40%] bg-[#BED7DC] rounded-[15px] text-center"
        />
      </div>
      <div>
        <div
          class="container_repos h-full w-4/5 grid grid-cols-2 auto-rows-auto gap-6 items-center m-auto mt-8 p-5"
        ></div>
      </div>

      <div class="button fixed bottom-5 right-5 flex gap-2">
        <button
          id="back-to-top"
          class="p-2 text-white rounded-full shadow-lg hover:bg-[#d4cbb3] focus:outline-none focus:ring-2 focus:ring-[#b3a897] focus:ring-opacity-50"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 1024 1024"
          >
            <path
              fill="black"
              d="M572.235 205.282v600.365a30.118 30.118 0 1 1-60.235 0V205.282L292.382 438.633a28.913 28.913 0 0 1-42.646 0a33.43 33.43 0 0 1 0-45.236l271.058-288.045a28.913 28.913 0 0 1 42.647 0L834.5 393.397a33.43 33.43 0 0 1 0 45.176a28.913 28.913 0 0 1-42.647 0l-219.618-233.23z"
            />
          </svg>
        </button>
        <button
          id="goo-to-stats"
          class="w-28 h-10 text-xs rounded-full bg-[#e5ddc5] shadow-lg hover:bg-[#d4cbb3] focus:outline-none focus:ring-2 focus:ring-[#b3a897] focus:ring-opacity-50"
        >
          Profil Insights
        </button>
      </div>
      <section class="stats_section h-full w-4/5 m-auto" style="display: none">
        <div class="flex justify-center h-44 w-[100%] mt-10">
          <div class="profil-type h-40 w-4/5 bg-[#F1EEDC] rounded-xl flex">
            <div class="m-4">
              <img
                src=""
                alt="avatar"
                class="avatar-pp w-32 h-32 rounded-full "
              />
            </div>
            <div
              class="flex justify-center items-center gap-4 text-xl font-semibold w-[60%]"
            >
              <p class="profil-info"></p>
              <p class="master"></p>
            </div>
            <div class="flex justify-end  w-auto h-12 mt-4">
              <img src="" alt="" class="flag-st" />
            </div>
          </div>
        </div>

        <div class="card-countainer grid grid-cols-2 grid-rows-1 w-full h-full items-center gap-6">

          <div class="card-1 w-[80%] h-44 bg-[#e5ddc5] rounded-xl flex justify-center items-center m-8"">
              <p class="repos-number text-base "></p>
          </div>
          <div class="card-2 w-[90%] h-44 bg-[#e5ddc5] rounded-xl flex justify-center items-center m-8">
                <p class="language text-base h-full flex  items-center p-5 "></p>
          </div>
          <div class="card-3 w-[80%] h-[70%] bg-[#e5ddc5] rounded-xl flex justify-center items-center"><canvas id="radar" class="w"></canvas></div>
          <div class="card-4 w-[80%] h-[70%] bg-[#e5ddc5] rounded-xl flex justify-center items-center"><canvas id="donate" class="w"></canvas></div>

        </div>
      </section>
    </main>
    <!-- <script src="./node_modules/dotenv/config.js"></script> -->
    <script src="../node_modules/chart.js/dist/chart.umd.js"></script>
    <script src="../node_modules/moment/moment.js"></script>
    <script src="./javascript/app.js"></script>
  </body>
</html>
